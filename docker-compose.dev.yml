version: '3.8'

services:
  # ========================================
  # PostgreSQL Database (สำหรับ dev)
  # ========================================
  db:
    image: postgres:17-alpine
    container_name: web-vrdnkcar-db-dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5438:5432"  # Expose to host
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================================
  # Next.js App (Development Mode)
  # ========================================
  app:
    image: node:20-alpine
    container_name: web-vrdnkcar-app-dev
    working_dir: /app
    environment:
      - NODE_ENV=development
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      # App settings
      - NEXT_PUBLIC_SITE_NAME=${NEXT_PUBLIC_SITE_NAME}
      - NEXT_PUBLIC_ORGANIZATION=${NEXT_PUBLIC_ORGANIZATION}
      - APP_URL=${APP_URL}
      # Notifications
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - LINE_TOKEN=${LINE_TOKEN}
      - LINE_USER_ID_1=${LINE_USER_ID_1}
      - LINE_USER_ID_2=${LINE_USER_ID_2}
      # Security
      - USE_SECURE_COOKIES=${USE_SECURE_COOKIES}
    ports:
      - "3000:3000"
    volumes:
      # 🔥 Volume mount - โค้ดทุกอย่างถูก sync เข้า container
      - .:/app
      # Cache node_modules ไว้ใน container
      - /app/node_modules
      - /app/.next
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        echo '🚀 Installing dependencies...'
        npm install
        echo '✅ Dependencies installed!'
        echo '🔥 Starting development server...'
        npm run dev
      "
    restart: unless-stopped

volumes:
  postgres_dev_data:
    name: web-vrdnkcar-postgres-dev-data
