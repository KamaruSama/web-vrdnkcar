apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-vrdnkcar-app
  namespace: web-vrdnkcar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-vrdnkcar-app
  template:
    metadata:
      labels:
        app: web-vrdnkcar-app
    spec:
      containers:
      - name: app
        image: web-vrdnkcar:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        envFrom:
        - secretRef:
            name: app-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: uploads-data
          mountPath: /app/public/uploads
        - name: backup-data
          mountPath: /app/backup-auto
      volumes:
      - name: uploads-data
        persistentVolumeClaim:
          claimName: uploads-data
      - name: backup-data
        persistentVolumeClaim:
          claimName: backup-data
